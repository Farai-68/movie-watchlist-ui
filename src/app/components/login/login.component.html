<div class="login-container">
  <div class="login-card">
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p>Sign in to manage your watchlist</p>
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="you@example.com">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
      </div>

      <!-- New Industry-Standard Row -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" name="rememberMe"> Remember me
        </label>
        
        <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="card-footer">
      <p>Don't have an account? <a routerLink="/register">Sign up here</a></p>
    </div>
  </div>
</div>
